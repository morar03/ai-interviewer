<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Interviewer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

    {% if user.is_authenticated %}
    <nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-lg font-semibold tracking-tight text-white">AI Interviewer</a>
        <div class="flex gap-6 items-center text-sm text-gray-400">
            <a href="/" class="hover:text-white transition">New Interview</a>
            <a href="/history/" class="hover:text-white transition">History</a>
            <a href="/logout/" class="hover:text-red-400 transition">Logout</a>
        </div>
    </nav>
    {% endif %}

    <main class="max-w-2xl mx-auto px-4 py-12">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
