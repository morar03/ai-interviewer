{% extends 'base.html' %}

{% block title %}Login — AI Interviewer{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md">

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-white mb-2">AI Interviewer</h1>
            <p class="text-gray-400">Sign in to continue</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">

            {% if error %}
            <div class="mb-6 px-4 py-3 bg-red-900/40 border border-red-700 rounded-lg text-red-400 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Username</label>
                    <input
                        type="text"
                        name="username"
                        autofocus
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
                        placeholder="Enter username"
                    />
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-2">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
                        placeholder="Enter password"
                    />
                </div>
                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-lg transition"
                >
                    Sign In
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
